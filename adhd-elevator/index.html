<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elevator Simulator</title>
  <style>
    :root {
      --bg1: #0b0f17;
      --bg2: #101826;
      --line: rgba(255,255,255,0.14);
      --text: #eef4ff;
      --muted: #aeb9cc;
      --accent: #ffcf5a;
      --accent2: #7cff9d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(110,200,255,0.14), transparent 25%),
        radial-gradient(circle at 80% 15%, rgba(255,207,90,0.10), transparent 20%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      display: block;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 12px;
    }

    .app {
      width: min(1600px, calc(100vw - 24px));
      min-height: calc(100vh - 24px);
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
      padding: 18px;
      border-radius: 30px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      box-shadow: 0 30px 80px rgba(0,0,0,0.45);
      margin: 0 auto;
    }

    .left, .right {
      border-radius: 24px;
      background: rgba(0,0,0,0.18);
      border: 1px solid var(--line);
      position: relative;
      overflow: hidden;
    }

    .header {
      position: absolute;
      top: 16px;
      left: 18px;
      right: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 5;
    }

    .title {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .status-strip {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .pill {
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--muted);
    }

    .building {
      position: absolute;
      inset: 74px 18px 18px 18px;
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 18px;
    }

    .shaft-wrap {
      position: relative;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
      box-shadow: inset 0 0 60px rgba(0,0,0,0.35);
    }

    .shaft-grid {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-rows: repeat(5, 1fr);
    }

    .floor-row {
      border-bottom: 1px solid rgba(255,255,255,0.08);
      position: relative;
    }

    .floor-row:last-child { border-bottom: 0; }

    .floor-label {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 18px;
      font-weight: 800;
      color: rgba(255,255,255,0.16);
      letter-spacing: 0.08em;
    }

    .hall-btn {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.18);
      background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.14), rgba(255,255,255,0.03));
      color: var(--text);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: box-shadow 0.18s ease, background 0.18s ease;
      box-shadow: inset 0 0 14px rgba(255,255,255,0.03), 0 8px 20px rgba(0,0,0,0.22);
    }

    .hall-btn:hover,
    .cab-btn:hover,
    .toggle:hover,
    .door-btn:hover {
      box-shadow: 0 0 0 1px rgba(110,200,255,0.35), 0 0 18px rgba(110,200,255,0.22), 0 10px 20px rgba(0,0,0,0.25);
    }

    .hall-btn.active,
    .cab-btn.active {
      color: #0d1118;
      background: radial-gradient(circle at 35% 30%, #fff4cf, var(--accent));
      box-shadow: 0 0 24px rgba(255,207,90,0.45), inset 0 0 12px rgba(255,255,255,0.35);
    }

    .shaft {
      position: absolute;
      left: 80px;
      right: 92px;
      top: 14px;
      bottom: 14px;
      border-radius: 20px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.025));
      border: 1px solid rgba(255,255,255,0.12);
      overflow: hidden;
    }

    .rails::before,
    .rails::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 8px;
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.04));
      z-index: 1;
    }

    .rails::before { left: 14px; }
    .rails::after { right: 14px; }

    .car {
      position: absolute;
      left: 26px;
      right: 26px;
      height: calc((100% - 56px) / 5);
      top: calc(100% - ((100% - 56px) / 5) - 14px);
      border-radius: 18px;
      background: linear-gradient(180deg, #dfe9f5, #9aa8bb);
      border: 1px solid rgba(255,255,255,0.4);
      box-shadow: 0 18px 34px rgba(0,0,0,0.3), inset 0 0 24px rgba(255,255,255,0.24);
      overflow: hidden;
      z-index: 3;
    }

    .car.moving {
      box-shadow: 0 0 0 2px rgba(110,200,255,0.25), 0 0 22px rgba(110,200,255,0.18), 0 18px 34px rgba(0,0,0,0.3);
    }

    .car-top {
      height: 14%;
      background: linear-gradient(180deg, rgba(255,255,255,0.7), rgba(255,255,255,0.08));
      border-bottom: 1px solid rgba(255,255,255,0.28);
    }

    .car-body {
      position: absolute;
      inset: 18px;
      border-radius: 12px;
      background: linear-gradient(180deg, #2f3746, #181d27);
      overflow: hidden;
    }

    .door {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 50%;
      background: linear-gradient(180deg, #909fb2, #677588);
      transition: transform 0.8s cubic-bezier(.2,.9,.2,1);
    }

    .door.right {
      right: 0;
      left: auto;
    }

    .car.open .door.left { transform: translateX(-92%); }
    .car.open .door.right { transform: translateX(92%); }

    .car-display {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      padding: 5px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,0.42);
      color: #9bffbd;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.15em;
      z-index: 5;
      box-shadow: 0 0 14px rgba(124,255,157,0.18);
    }

    .sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .65;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.2) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(110,200,255,.18) 0 1px, transparent 1.6px);
      background-size: 32px 32px, 52px 52px;
      background-position: 0 0, 10px 18px;
      animation: drift 10s linear infinite;
    }

    @keyframes drift {
      from { transform: translateY(0); }
      to { transform: translateY(24px); }
    }

    .queue-panel {
      border-radius: 24px;
      padding: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .queue-title {
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .16em;
      font-weight: 800;
    }

    .queue-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-content: flex-start;
    }

    .queue-chip {
      min-width: 48px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      text-align: center;
      font-weight: 800;
      font-size: 18px;
    }

    .right {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 18px;
      overflow-y: auto;
      overflow-x: hidden;
      min-height: 0;
    }

    .right > * {
      flex-shrink: 0;
    }

    .display-panel {
      border-radius: 24px;
      padding: 18px;
      background: linear-gradient(180deg, rgba(0,0,0,0.28), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.12);
      display: grid;
      gap: 10px;
    }

    .digital {
      height: 108px;
      border-radius: 20px;
      padding: 14px 18px;
      background: linear-gradient(180deg, #07090e, #121722);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: inset 0 0 28px rgba(110,200,255,0.06), 0 14px 30px rgba(0,0,0,0.25);
      display: grid;
      align-content: center;
      gap: 8px;
    }

    .digital-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .digital-floor {
      font-size: 52px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.08em;
      color: var(--accent2);
      text-shadow: 0 0 20px rgba(124,255,157,.22);
    }

    .direction {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 800;
      color: #a4ddff;
    }

    .panel-label {
      font-size: 13px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .16em;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .cab-btn {
      height: 92px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 22px;
      background: radial-gradient(circle at 35% 25%, rgba(255,255,255,0.13), rgba(255,255,255,0.03));
      color: var(--text);
      cursor: pointer;
      transition: box-shadow 0.18s ease, background 0.18s ease;
      box-shadow: inset 0 0 14px rgba(255,255,255,0.03), 0 8px 18px rgba(0,0,0,0.22);
      overflow: hidden;
    }

    .cab-floor {
      font-size: 34px;
      font-weight: 900;
      line-height: 1;
    }

    .cab-sub {
      margin-top: 6px;
      font-size: 11px;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 800;
    }

    .controls-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .door-btn, .toggle {
      height: 62px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: .16s ease;
      box-shadow: 0 10px 18px rgba(0,0,0,.18);
    }

    .toggles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .toggle.on {
      background: linear-gradient(180deg, rgba(124,255,157,.25), rgba(124,255,157,.08));
      border-color: rgba(124,255,157,.45);
      box-shadow: 0 0 20px rgba(124,255,157,.14);
    }

    .log {
      border-radius: 22px;
      padding: 16px;
      background: rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .log-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 14px;
      color: var(--muted);
      max-height: 180px;
      overflow: auto;
      padding-right: 4px;
    }

    .log-item {
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .right::-webkit-scrollbar,
    .log-list::-webkit-scrollbar {
      width: 10px;
    }

    .right::-webkit-scrollbar-track,
    .log-list::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.04);
      border-radius: 999px;
    }

    .right::-webkit-scrollbar-thumb,
    .log-list::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.18);
      border-radius: 999px;
    }

    .right::-webkit-scrollbar-thumb:hover,
    .log-list::-webkit-scrollbar-thumb:hover {
      background: rgba(255,255,255,0.28);
    }

    @media (max-width: 920px) {
      body {
        padding: 8px;
      }

      .app {
        min-height: auto;
        grid-template-columns: 1fr;
        width: 100%;
        padding: 12px;
        gap: 12px;
        border-radius: 20px;
      }

      .left {
        min-height: 620px;
      }

      .building {
        grid-template-columns: 1fr;
      }

      .queue-panel {
        order: -1;
      }

      .right {
        max-height: none;
        overflow: visible;
        padding: 14px;
      }
    }

    @media (max-width: 640px) {
      .header {
        position: static;
        padding: 16px 16px 0 16px;
        flex-direction: column;
        align-items: flex-start;
        gap: 12px;
      }

      .building {
        position: static;
        inset: auto;
        padding: 12px;
        grid-template-columns: 1fr;
      }

      .shaft-wrap {
        min-height: 520px;
      }

      .title {
        font-size: 24px;
      }

      .status-strip {
        width: 100%;
        justify-content: flex-start;
      }

      .button-grid,
      .controls-row,
      .toggles {
        grid-template-columns: 1fr;
      }

      .cab-btn {
        height: 78px;
      }

      .hall-btn {
        width: 48px;
        height: 48px;
      }

      .queue-panel {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="left">
      <div class="header">
        <div class="title">Elevator</div>
        <div class="status-strip">
          <div class="pill" id="modePill">Mode: normal</div>
          <div class="pill" id="doorPill">Doors: closed</div>
          <div class="pill" id="soundPill">Sound: on</div>
        </div>
      </div>

      <div class="building">
        <div class="shaft-wrap">
          <div class="sparkles"></div>
          <div class="shaft-grid" id="floorGrid"></div>
          <div class="shaft rails" id="shaft">
            <div class="car" id="car">
              <div class="car-top"></div>
              <div class="car-display" id="carDisplay">F1</div>
              <div class="car-body">
                <div class="door left"></div>
                <div class="door right"></div>
              </div>
            </div>
          </div>
        </div>

        <aside class="queue-panel">
          <div>
            <div class="queue-title">Floor queue</div>
            <div class="queue-list" id="queueList"></div>
          </div>
          <div>
            <div class="queue-title">Press floor buttons</div>
            <div style="color: var(--muted); line-height: 1.6; font-size: 14px;">
              You can press the buttons inside the elevator and on each floor. The elevator remembers the queue, lights up buttons, and opens the doors when it arrives.
            </div>
          </div>
        </aside>
      </div>
    </section>

    <section class="right">
      <div class="display-panel">
        <div class="panel-label">Display</div>
        <div class="digital">
          <div class="digital-top">
            <span>Current floor</span>
            <span class="direction" id="directionText">• idle</span>
          </div>
          <div class="digital-floor" id="digitalFloor">1</div>
        </div>
      </div>

      <div>
        <div class="panel-label">Cab panel</div>
        <div class="button-grid" id="cabPanel"></div>
      </div>

      <div>
        <div class="panel-label">Controls</div>
        <div class="controls-row" style="margin-bottom:12px;">
          <button class="door-btn" id="openBtn">Open doors</button>
          <button class="door-btn" id="closeBtn">Close doors</button>
        </div>
        <div class="toggles">
          <button class="toggle on" id="adhdBtn">ADHD mode</button>
          <button class="toggle on" id="soundBtn">Click sound</button>
        </div>
      </div>

      <div class="log">
        <div class="panel-label">Elevator log</div>
        <div class="log-list" id="logList"></div>
      </div>
    </section>
  </div>

  <script>
    const floors = [5, 4, 3, 2, 1];
    const totalFloors = 5;

    let currentFloor = 1;
    let targetFloor = null;
    let queue = [];
    let isMoving = false;
    let doorsOpen = false;
    let adhdMode = true;
    let soundOn = true;
    let doorTimer = null;
    let moveAnimationId = null;

    const car = document.getElementById('car');
    const shaft = document.getElementById('shaft');
    const digitalFloor = document.getElementById('digitalFloor');
    const directionText = document.getElementById('directionText');
    const floorGrid = document.getElementById('floorGrid');
    const cabPanel = document.getElementById('cabPanel');
    const queueList = document.getElementById('queueList');
    const carDisplay = document.getElementById('carDisplay');
    const logList = document.getElementById('logList');
    const doorPill = document.getElementById('doorPill');
    const modePill = document.getElementById('modePill');
    const soundPill = document.getElementById('soundPill');
    const adhdBtn = document.getElementById('adhdBtn');
    const soundBtn = document.getElementById('soundBtn');

    const activeButtons = new Map();

    function beep(freq = 620, duration = 0.06, type = 'sine', volume = 0.02) {
      if (!soundOn) return;
      const ctx = beep.ctx || new (window.AudioContext || window.webkitAudioContext)();
      beep.ctx = ctx;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = volume;
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + duration);
    }

    function addLog(text) {
      const item = document.createElement('div');
      item.className = 'log-item';
      item.textContent = text;
      logList.prepend(item);
      while (logList.children.length > 8) {
        logList.removeChild(logList.lastChild);
      }
    }

    function setDirectionLabel(text) {
      directionText.textContent = text;
    }

    function updateDoorStateUI() {
      doorPill.textContent = `Doors: ${doorsOpen ? 'open' : 'closed'}`;
    }

    function getCarTopForFloor(floor) {
      const safeFloor = Math.max(1, Math.min(totalFloors, floor));
      const shaftHeight = shaft.clientHeight;
      const carHeight = car.offsetHeight;
      const usableHeight = shaftHeight - carHeight;
      const step = usableHeight / (totalFloors - 1);
      return usableHeight - (safeFloor - 1) * step;
    }

    function setCarFloor(floor) {
      const safeFloor = Math.max(1, Math.min(totalFloors, floor));
      car.style.top = `${getCarTopForFloor(safeFloor)}px`;
      currentFloor = safeFloor;
      digitalFloor.textContent = safeFloor;
      carDisplay.textContent = `F${safeFloor}`;
      highlightCurrentFloor();
    }

    function highlightCurrentFloor() {
      document.querySelectorAll('.floor-row').forEach(row => {
        row.style.background =
          Number(row.dataset.floor) === currentFloor
            ? 'rgba(110,200,255,0.08)'
            : 'transparent';
      });
    }

    function renderQueue() {
      queueList.innerHTML = '';
      if (queue.length === 0) {
        const chip = document.createElement('div');
        chip.className = 'queue-chip';
        chip.style.opacity = '.55';
        chip.textContent = '—';
        queueList.appendChild(chip);
        return;
      }

      queue.forEach(floor => {
        const chip = document.createElement('div');
        chip.className = 'queue-chip';
        chip.textContent = floor;
        queueList.appendChild(chip);
      });
    }

    function activateButton(type, floor, on) {
      const key = `${type}-${floor}`;
      const btn = activeButtons.get(key);
      if (!btn) return;
      btn.classList.toggle('active', on);
    }

    function openDoors(manual = false) {
      if (isMoving) return;
      clearTimeout(doorTimer);
      doorsOpen = true;
      car.classList.add('open');
      updateDoorStateUI();
      if (manual) addLog(`Opened doors on floor ${currentFloor}`);
      beep(720, 0.05, 'triangle', 0.02);
      beep(860, 0.07, 'triangle', 0.018);
      doorTimer = setTimeout(() => {
        if (!isMoving) closeDoors(false);
      }, adhdMode ? 1800 : 2600);
    }

    function closeDoors(manual = true) {
      clearTimeout(doorTimer);
      doorsOpen = false;
      car.classList.remove('open');
      updateDoorStateUI();
      if (manual) addLog(`Closed doors on floor ${currentFloor}`);
      beep(480, 0.05, 'triangle', 0.02);
      beep(360, 0.06, 'triangle', 0.016);
    }

    function callElevator(floor, type = 'cab') {
      if (floor < 1 || floor > totalFloors) return;

      beep(adhdMode ? 840 : 620, 0.04, 'sine', adhdMode ? 0.03 : 0.02);

      if (floor === currentFloor && !isMoving) {
        activateButton(type, floor, true);
        addLog(`Floor ${floor}: elevator is already here`);
        openDoors();
        setTimeout(() => activateButton(type, floor, false), 700);
        return;
      }

      if (!queue.includes(floor) && floor !== targetFloor) {
        queue.push(floor);
        addLog(`Added floor ${floor} to queue`);
      }

      activateButton(type, floor, true);
      renderQueue();
      processQueue();
    }

    function processQueue() {
      if (isMoving || queue.length === 0) return;
      closeDoors(false);
      targetFloor = queue.shift();
      renderQueue();
      moveToFloor(targetFloor);
    }

    function easeInOutCubic(t) {
      return t < 0.5
        ? 4 * t * t * t
        : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }

    function moveToFloor(floor) {
      const safeTarget = Math.max(1, Math.min(totalFloors, floor));
      const startFloor = currentFloor;
      const distance = Math.abs(safeTarget - startFloor);

      if (distance === 0) {
        isMoving = false;
        setDirectionLabel('• idle');
        openDoors(false);
        targetFloor = null;
        return;
      }

      isMoving = true;
      car.classList.add('moving');

      const direction = safeTarget > startFloor ? '↑ going up' : '↓ going down';
      setDirectionLabel(direction);
      addLog(`Going to floor ${safeTarget}`);

      const duration = 1400 + distance * 700;
      const startTop = getCarTopForFloor(startFloor);
      const targetTop = getCarTopForFloor(safeTarget);
      const startTime = performance.now();
      const step = safeTarget > startFloor ? 1 : -1;
      let lastShownFloor = startFloor;

      if (moveAnimationId) {
        cancelAnimationFrame(moveAnimationId);
      }

      function animate(now) {
        const elapsed = now - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = easeInOutCubic(progress);
        const currentTopPx = startTop + (targetTop - startTop) * eased;
        car.style.top = `${currentTopPx}px`;

        const passed = Math.max(0, Math.min(distance, Math.floor(progress * distance)));
        const displayFloor = Math.max(1, Math.min(totalFloors, startFloor + passed * step));

        if (displayFloor !== lastShownFloor) {
          lastShownFloor = displayFloor;
          digitalFloor.textContent = displayFloor;
          carDisplay.textContent = `F${displayFloor}`;
          beep(adhdMode ? 500 + displayFloor * 30 : 420 + displayFloor * 20, 0.02, 'square', 0.012);
        }

        if (progress < 1) {
          moveAnimationId = requestAnimationFrame(animate);
        } else {
          moveAnimationId = null;
          isMoving = false;
          car.classList.remove('moving');
          currentFloor = safeTarget;
          car.style.top = `${targetTop}px`;
          digitalFloor.textContent = safeTarget;
          carDisplay.textContent = `F${safeTarget}`;
          setDirectionLabel('• idle');
          activateButton('cab', safeTarget, false);
          activateButton('hall', safeTarget, false);
          highlightCurrentFloor();
          addLog(`Arrived at floor ${safeTarget}`);
          beep(950, 0.06, 'triangle', 0.024);
          openDoors(false);
          targetFloor = null;
          setTimeout(processQueue, adhdMode ? 700 : 1100);
        }
      }

      moveAnimationId = requestAnimationFrame(animate);
    }

    function createFloorRows() {
      floors.forEach(floor => {
        const row = document.createElement('div');
        row.className = 'floor-row';
        row.dataset.floor = floor;

        const label = document.createElement('div');
        label.className = 'floor-label';
        label.textContent = `F${floor}`;

        const btn = document.createElement('button');
        btn.className = 'hall-btn';
        btn.textContent = floor;
        btn.addEventListener('click', () => callElevator(floor, 'hall'));

        row.appendChild(label);
        row.appendChild(btn);
        floorGrid.appendChild(row);
        activeButtons.set(`hall-${floor}`, btn);
      });
    }

    function createCabButtons() {
      floors.forEach(floor => {
        const btn = document.createElement('button');
        btn.className = 'cab-btn';
        btn.innerHTML = `<div class="cab-floor">${floor}</div><div class="cab-sub">floor</div>`;
        btn.addEventListener('click', () => callElevator(floor, 'cab'));
        cabPanel.appendChild(btn);
        activeButtons.set(`cab-${floor}`, btn);
      });
    }

    document.getElementById('openBtn').addEventListener('click', () => openDoors(true));
    document.getElementById('closeBtn').addEventListener('click', () => closeDoors(true));

    adhdBtn.addEventListener('click', () => {
      adhdMode = !adhdMode;
      adhdBtn.classList.toggle('on', adhdMode);
      modePill.textContent = `Mode: ${adhdMode ? 'ADHD' : 'normal'}`;
      addLog(`ADHD mode ${adhdMode ? 'enabled' : 'disabled'}`);
      beep(adhdMode ? 980 : 540, 0.05, 'sawtooth', 0.018);
    });

    soundBtn.addEventListener('click', () => {
      soundOn = !soundOn;
      soundBtn.classList.toggle('on', soundOn);
      soundPill.textContent = `Sound: ${soundOn ? 'on' : 'off'}`;
      if (soundOn) beep(640, 0.05, 'sine', 0.02);
    });

    window.addEventListener('resize', () => {
      if (!isMoving) {
        setCarFloor(currentFloor);
      }
    });

    createFloorRows();
    createCabButtons();
    setCarFloor(1);
    renderQueue();
    updateDoorStateUI();
    highlightCurrentFloor();
    addLog('Elevator system ready');
    addLog('Press a floor button to start');
  </script>
</body>
</html>
