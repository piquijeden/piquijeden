<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>piq's projects</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      background: #0d0d0d;
      color: #f5f5f5;
      font-family: Arial, sans-serif;
      padding: 40px 20px 100px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .title {
      font-size: clamp(36px, 8vw, 72px);
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: lowercase;
    }

    .back-link {
      text-decoration: none;
      color: #f5f5f5;
      border: 1px solid #333;
      background: #161616;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
      transition: 0.2s ease;
    }

    .back-link:hover {
      background: #f5f5f5;
      color: #111;
      border-color: #f5f5f5;
    }

    .projects {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .project-card {
      background: #161616;
      border: 1px solid #272727;
      border-radius: 22px;
      padding: 18px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .project-info {
      flex: 1 1 320px;
    }

    .project-name {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .project-desc {
      font-size: 14px;
      color: #b8b8b8;
      line-height: 1.5;
    }

    .project-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .project-actions a {
      text-decoration: none;
      color: #f5f5f5;
      border: 1px solid #333;
      background: #0f0f0f;
      padding: 9px 14px;
      border-radius: 999px;
      font-size: 13px;
      transition: 0.2s ease;
      white-space: nowrap;
    }

    .project-actions a:hover {
      background: #f5f5f5;
      color: #111;
      border-color: #f5f5f5;
    }

    .footer-nav {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .footer-nav a {
      text-decoration: none;
      color: #f5f5f5;
      border: 1px solid #333;
      background: #161616;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      transition: 0.2s ease;
    }

    .footer-nav a:hover,
    .footer-nav a.active {
      background: #f5f5f5;
      color: #111;
      border-color: #f5f5f5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <div class="title">Projects</div>
      <a class="back-link" href="../index.html">Go Back</a>
    </div>

    <div class="projects">
      <div class="project-card">
        <div class="project-info">
          <div class="project-name">Pierbonka</div>
          <div class="project-desc">Small minigame that i made using chat gpt (its in python too) (Polish only)</div>
        </div>
        <div class="project-actions">
          <a href="../pierbonka">Go See &#8594;</a>
        </div>
      </div>

      <div class="project-card">
        <div class="project-info">
          <div class="project-name">Coming Soon...</div>
          <div class="project-desc">idk</div>
        </div>
      </div>
  <div class="footer-nav">
    <a href="../index.html">Home</a>
    <a href="projects.html" class="active">Projects</a>
    <a href="#">Coming Soon...</a>
  </div>
</body>
</h
