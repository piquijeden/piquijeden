<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Casino Projects</title>
  <style>
    :root {
      --bg: #050505;
      --bg2: #0d0d0d;
      --panel: rgba(255, 255, 255, 0.03);
      --text: #f5f5f5;
      --muted: #b3b3b3;
      --border: rgba(255,255,255,0.08);
      --gold: #d4af37;
      --gold-soft: rgba(212, 175, 55, 0.18);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(212,175,55,0.08), transparent 30%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      min-height: 100vh;
      padding: 32px 18px;
    }

    .wrap {
      width: min(920px, 100%);
      margin: 0 auto;
    }

    .topline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .back-link,
    .footer-link,
    .card-link {
      color: var(--text);
      text-decoration: none;
      transition: opacity 0.18s ease, transform 0.18s ease, color 0.18s ease;
    }

    .back-link:hover,
    .footer-link:hover,
    .card-link:hover {
      opacity: 0.92;
      color: var(--gold);
    }

    h1 {
      margin: 0 0 18px;
      font-size: clamp(2rem, 4vw, 3rem);
      letter-spacing: 0.02em;
    }

    .list {
      display: grid;
      gap: 16px;
    }

    .item {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.24);
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .item:hover {
      transform: translateY(-2px);
      border-color: var(--gold-soft);
      box-shadow: 0 14px 34px rgba(0,0,0,0.3), 0 0 0 1px var(--gold-soft) inset;
    }

    .item h2 {
      margin: 0 0 8px;
      font-size: clamp(1.15rem, 2vw, 1.6rem);
    }

    .item p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      max-width: 62ch;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 16px;
      flex-wrap: wrap;
    }

    .go-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(212,175,55,0.1);
      border: 1px solid rgba(212,175,55,0.22);
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      white-space: nowrap;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .go-btn:hover {
      transform: translateY(-1px);
      background: rgba(212,175,55,0.16);
      border-color: rgba(212,175,55,0.38);
    }

    .footer {
      margin-top: 26px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
    }

    .footer span {
      color: var(--text);
    }

    @media (max-width: 640px) {
      body { padding: 22px 12px; }
      .item { padding: 18px; }
      .go-btn { width: 100%; }
      .item-row { align-items: stretch; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topline">
      <a class="back-link" href="https://piq.lol">Go Back</a>
    </div>

    <h1>Casino Projects</h1>

    <div class="list">
      <article class="item">
        <div class="item-row">
          <div>
            <h2>Piqui Slots</h2>
            <p>Casino-style slot machine, sometimes silly:3</p>
          </div>
          <a class="go-btn" href="../slots">Go See →</a>
        </div>
      </article>

      <article class="item">
        <div class="item-row">
          <div>
            <h2>Makeship Blackjack</h2>
            <p>Blackjack with your custom plushie cards, shared casino balance, sounds and mobile-friendly controls.</p>
          </div>
          <a class="go-btn" href="../makeship-bj">Go See →</a>
        </div>
      </article>

      <article class="item">
        <div class="item-row">
          <div>
            <h2>Coming Soon...</h2>
          </div>
          <a class="go-btn" href="#">Go See →</a>
        </div>
      </article>
    </div>

    <div class="footer">
      <a class="footer-link" href="https://piq.lol">Home</a>
      <span>Casino Projects</span>
      <a class="footer-link" href="https://piq.lol/info">Info / Contact</a>
    </div>
  </div>
</body>
</html>
